<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Project | Metasploit MCP</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-danger" href="#">PHANTOM MCP</a>
        <div class="d-flex">
            <span class="badge bg-outline-secondary border me-2" id="msf-status">MSF: DISCONNECTED</span>
            <span class="badge bg-success">DB: ACTIVE</span>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4">
    <div class="row">
        <!-- Control Panel -->
        <div class="col-md-4">
            <div class="card bg-secondary text-white mb-3">
                <div class="card-header fw-bold">Target Discovery</div>
                <div class="card-body">
                    <input type="text" id="target-range" class="form-control mb-2 bg-dark text-white border-secondary" placeholder="192.168.1.0/24">
                    <button class="btn btn-danger w-100" onclick="startScan()">Scan for Vulnerabilities</button>
                </div>
            </div>

            <div class="card bg-secondary text-white mb-3">
                <div class="card-header fw-bold">Exploitation</div>
                <div class="card-body">
                    <label class="small">Available Exploits</label>
                    <select id="exploit-select" class="form-select mb-2 bg-dark text-white border-secondary">
                        <option>Loading exploits...</option>
                    </select>
                    <label class="small">Payload</label>
                    <select id="payload-select" class="form-select mb-2 bg-dark text-white border-secondary">
                        <option value="generic/shell_reverse_tcp">generic/shell_reverse_tcp</option>
                        <option value="windows/x64/meterpreter/reverse_tcp">windows/x64/meterpreter/reverse_tcp</option>
                    </select>
                    <button class="btn btn-outline-warning w-100" onclick="launchAttack()">Execute Exploit</button>
                </div>
            </div>
        </div>

        <!-- Monitoring Console -->
        <div class="col-md-8">
            <div class="card bg-black text-success border-secondary mb-3">
                <div class="card-header bg-secondary text-white d-flex justify-content-between">
                    <span>Active Sessions</span>
                    <button class="btn btn-sm btn-outline-light" onclick="refreshSessions()">Refresh</button>
                </div>
                <div class="card-body p-0">
                    <table class="table table-dark table-hover mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Target IP</th>
                                <th>Platform</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="session-list">
                            <tr><td colspan="4" class="text-center text-muted">No active sessions</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card bg-black border-secondary">
                <div class="card-header bg-secondary text-white">Live Logs</div>
                <div class="card-body small font-monospace" style="height: 200px; overflow-y: scroll;" id="log-output">
                    [SYSTEM] Phantom MCP Dashboard initialized...
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function startScan() {
        const target = document.getElementById('target-range').value;
        logMessage(`Starting scan on ${target}...`);
        // Add fetch call to /api/scan here
    }

    function logMessage(msg) {
        const output = document.getElementById('log-output');
        const time = new Date().toLocaleTimeString();
        output.innerHTML += `<div>[${time}] ${msg}</div>`;
        output.scrollTop = output.scrollHeight;
    }
</script>

</body>
</html>
